# =============================================================================
# TMUX CONFIG - Keyboard-centric, Vi-friendly, Modern
# =============================================================================

# Change prefix from C-b to C-Space (easier to reach, doesn't conflict with vim)
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# Use 256 colors
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:RGB,tmux-256color:RGB"

# Vi-style key bindings in copy mode
set-window-option -g mode-keys vi

# Vim-like pane navigation (without prefix for speed inside vim)
bind-key -n C-h select-pane -L
bind-key -n C-j select-pane -D
bind-key -n C-k select-pane -U
bind-key -n C-l select-pane -R

# Split panes with intuitive keys (prefix + | for vertical, prefix + - for horizontal)
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows in current directory
bind-key c new-window -c "#{pane_current_path}"

# Renumber windows when one is closed
set-option -g renumber-windows on

# Vi-style selection and copy in copy mode
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-selection-and-cancel

# Faster key repeat
set-option -g repeat-time 250

# Increase scrollback history
set-option -g history-limit 10000

# Mouse support (useful but keep keyboard-first)
set-option -g mouse on

# Pane border colors
set-option -g pane-border-style "fg=#a89984"
set-option -g pane-active-border-style "fg=#45707a"

# Statusline - clean and minimal
set-option -g status-style "bg=#fbf1c7,fg=#654735"
set-option -g status-left "#[fg=#45707a,bold] #S #[fg=#a89984]│ "
set-option -g status-right " #[fg=#a89984]│ #[fg=#654735]%H:%M"

set-option -g status-left "#[fg=#45707a,bold] #S #[fg=#a89984]│ "
set-option -g status-right " #[fg=#a89984]│ #[fg=#654735]%H:%M"

# Window list styling
set-window-option -g window-status-format "#[fg=#a89984] #I:#W "
set-window-option -g window-status-current-format "#[fg=#45707a,bold] #I:#W#[fg=#6c782e]* "

# Alert for activity in other windows
set-window-option -g monitor-activity on
set-option -g visual-activity off

# Start window and pane numbering at 1 (easier to reach than 0)
set-option -g base-index 1
set-window-option -g pane-base-index 1

# Display popups
bind C-y display-popup \
  -d "#{pane_current_path}" \
  -w 80% \
  -h 80% \
  -E "lazygit"

# Python test runners
# Send pytest command to last pane (prefix + t)
bind-key t send-keys -t ! "pytest -v" C-m

# Open test runner in vertical split (prefix + T)
bind-key T split-window -h -p 40 -c "#{pane_current_path}" "pytest -v --watch"

# =============================================================================
# BONUS: Smart window switching with prefix + number (already built-in)
# prefix + 1-9 goes to window 1-9
# prefix + l toggles between current and previous window
# =============================================================================
